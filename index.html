<!DOCTYPE html>
<html lang="en">   
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>QR Cook Mate</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
    --primary-color: #f5f1ea;     
    --secondary-color: #f8c889;   
    --accent-dark: #70442b;       
    --text-dark: #5a290f;        
    --smoke-white: #f5f3f0;
    --card-bg: #fffaf2;
    --font-heading: 'Quicksand', sans-serif;
    --font-body: 'Poppins', sans-serif;

}

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    html {
        scroll-behavior: smooth;
    }

    body {
        font-family: var(--font-body);
        background-color: var(--secondary-color);
        color: var(--accent-dark);
        overflow-x: hidden;
    }

    img {
        max-width: 100%;
        display: block;
    }

    h1, h2, h3 {
        font-family: var(--font-heading);
        font-weight: 700;
        color: var(--accent-dark);
    }

    nav {
        position: fixed;
        top: 0;
        width: 100%;
        background: var(--text-dark);
        padding: 14px 0;
        z-index: 1000;
        backdrop-filter: blur(12px);
        box-shadow: 0 4px 25px rgba(74, 53, 50, 0.06);
    }

    .nav-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
    }

    .nav-left {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .logo {
        height: 45px;
        width: 45px;
        object-fit: cover;
        border-radius: 50%;
    }

    .brand-name {
        color: var(--smoke-white);
        font-weight: 700;
        font-size: clamp(1.2rem, 4vw, 1.6rem);
        letter-spacing: 0.5px;
    }

    .nav-right {
        display: flex;
        align-items: center;
    }

    .nav-right a {
        color: var(--smoke-white);
        margin-left: 25px;
        text-decoration: none;
        font-weight: 500;
        font-size: 0.95rem;
        transition: color 0.3s ease;
        white-space: nowrap;
    }

    .nav-right a:hover {
        color: var(--secondary-color);
    }

    .menu-toggle {
        display: none;
        flex-direction: column;
        justify-content: center;
        gap: 5px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 8px;
        z-index: 1100;
    }

    .menu-toggle span {
        width: 26px;
        height: 3px;
        background: var(--smoke-white);
        border-radius: 2px;
        transition: 0.3s ease;
    }

    section {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 110px 16px 60px;
        background-size: cover;
        background-position: center;
        background-attachment: scroll;
        position: relative;
    }

    #section1, #section2, #section3, #section4, #section5 {
        background-image: linear-gradient(rgba(74, 53, 50, 0.5), rgba(107, 76, 71, 0.6)), url("123.jpg");
    }

    section .overlay {
        background: rgba(255, 255, 255, 0.96);
        padding: clamp(28px, 6vw, 60px) clamp(20px, 5vw, 40px);
        width: 100%;
        max-width: 1100px;
        border-radius: 24px;
        box-shadow: 0 15px 35px rgba(107, 76, 71, 0.05);
        color: var(--accent-dark);
    }

    #section1 h1 {
        font-size: clamp(1.8rem, 6vw, 3.5rem);
        line-height: 1.2;
        color: var(--accent-dark);
        text-shadow: 0 4px 15px rgba(74, 53, 50, 0.35);
    }

    #section1 h2 {
        font-size: clamp(0.95rem, 2.5vw, 1.2rem);
        font-weight: 400;
        margin-top: 18px;
        line-height: 1.6;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
    }

    #section2 h2, #section3 h2, #section4 h1, #section5 h1:first-of-type {
        font-size: clamp(1.6rem, 5vw, 2.6rem);
        margin-bottom: 20px;
        color: var(--accent-dark);
        letter-spacing: -0.5px;
    }

    #section2 p, #section4 h3 {
        line-height: 1.9;
        font-size: clamp(0.95rem, 2.5vw, 1.15rem);
        font-weight: 400;
        max-width: 750px;
        margin: 0 auto;
        color: var(--accent-dark);
        opacity: 0.95;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 30px; 
        margin-top: 45px;
    }

    .product {
        display: flex;
        flex-direction: column;
        align-items: center;
        background: var(--card-bg); 
        border-radius: 24px;
        padding: 28px 20px;
        border: 1px solid rgba(112, 68, 43, 0.15);
        box-shadow: 0 6px 20px rgba(107, 76, 71, 0.08);
        transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s ease;
        text-decoration: none;
        overflow: hidden;
    }

    .product img {
        width: 100%;      
        height: 240px; 
        object-fit: cover; 
        border-radius: 16px;
        margin-bottom: 18px;
        transition: transform 0.5s ease;
    }

    .product-icon {
        font-size: 2.4rem;
        margin-bottom: 14px;
    }

    .product-info h3 {
        font-size: 1.3rem;
        color: var(--accent-dark);
        transition: color 0.3s ease;
        padding: 4px 0;
    }

    .product-info p {
        font-size: 0.9rem;
        color: var(--accent-dark);
        opacity: 0.8;
        margin-top: 6px;
        line-height: 1.5;
    }

    .product:hover {
        transform: translateY(-8px);
        box-shadow: 0 16px 32px rgba(112, 68, 43, 0.3);
    }

    .product:hover img {
        transform: scale(1.04); 
    }

    .product:hover h3 {
        color: var(--text-dark);
    }

    .quiz-link {
        display: inline-block;
        margin-top: 25px;
        padding: 14px 36px;
        background: var(--accent-dark);
        color: var(--smoke-white);
        font-family: var(--font-heading);
        font-weight: 700;
        font-size: clamp(1rem, 2.5vw, 1.2rem);
        text-decoration: none;
        border-radius: 50px;
        box-shadow: 0 8px 20px rgba(59, 36, 24, 0.25);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .quiz-link:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 26px rgba(59, 36, 24, 0.35);
    }
    
    footer {
        text-align: center;
        padding: 30px 16px;
        background: var(--text-dark);
        color: var(--smoke-white);
        font-size: 0.9rem;
        letter-spacing: 0.6px;
    }

    /* ===== Responsive Design ===== */

    /* Tablets */
    @media (max-width: 900px) {
        .nav-container {
            padding: 0 16px;
        }
        section .overlay {
            border-radius: 20px;
        }
    }

    /* Phones and small tablets: collapse nav into a menu */
    @media (max-width: 768px) {
        .menu-toggle {
            display: flex;
        }

        .nav-right {
            position: fixed;
            top: 0;
            right: 0;
            height: 100dvh;
            width: min(70%, 280px);
            background: var(--text-dark);
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 90px 30px 30px;
            transform: translateX(100%);
            transition: transform 0.35s ease;
            box-shadow: -8px 0 25px rgba(0,0,0,0.15);
        }

        .nav-right.open {
            transform: translateX(0);
        }

        .nav-right a {
            margin: 0 0 22px 0;
            font-size: 1.1rem;
        }

        section {
            padding: 100px 14px 50px;
        }
    }

    /* Very small phones */
    @media (max-width: 420px) {
        .brand-name {
            font-size: 1.1rem;
        }
        section .overlay {
            padding: 24px 18px;
        }
        .quiz-link {
            padding: 12px 28px;
        }
    }

    /* Landscape / short-height screens: avoid forcing full viewport height */
    @media (max-height: 480px) and (orientation: landscape) {
        section {
            min-height: auto;
            padding: 90px 16px 40px;
        }
    }

    /* Large desktop screens */
    @media (min-width: 1400px) {
        section .overlay {
            max-width: 1300px;
        }
    }
</style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="nav-left">
                <span class="brand-name">QR Cook Mate</span>
            </div>
        </div>
    </nav>


    
    <section id="section1">
        <div class="overlay">
        <h1>QR Cook Mate</h1>
        <h2>your classate in cooking. Learn cooking accuracy through <br>ingredients and procedure checks.</h2>
    </div>
      </section>

    <section id="section2">
        <div class="overlay">
            <h2>Master the Art of Cooking</h2>
            <div class="grid">
                <a href="vegetable-salad.html" class="product">
                    <div class="product-info">
                        <h3>Vegetable Salad</h3>
                    </div>
                </a>

                <a href="chicken-stock.html" class="product">
                    <div class="product-info">
                        <h3>Chicken Stock</h3>
                    </div>
                </a>

                <a href="egg-drop-soup.html" class="product">
                    <div class="product-info">
                        <h3>Egg Drop Soup</h3>
                    </div>
                </a>
            </div>
        </div>
    </section>
</body>
</html>
